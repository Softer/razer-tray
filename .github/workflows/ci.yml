name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps for ksni / notify-rust build
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --release --all-targets -- -D warnings

      - name: cargo build
        run: cargo build --release

      - name: cargo test
        run: cargo test --release

      - name: smoke - --version exits 0
        run: ./target/release/razer-tray --version

      - name: smoke - --help exits 0
        run: ./target/release/razer-tray --help

  aur-lint:
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    steps:
      - name: Install lint tools
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed git namcap sudo

      - uses: actions/checkout@v4

      - name: Mark workspace safe for git (different uid in container)
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Set up unprivileged user (makepkg refuses to run as root)
        run: |
          useradd -m builder
          chown -R builder:builder "$GITHUB_WORKSPACE"

      - name: Validate razer-tray (source) PKGBUILD
        working-directory: arch/aur/razer-tray
        run: |
          bash -n PKGBUILD
          namcap PKGBUILD
          sudo -u builder makepkg --printsrcinfo > .SRCINFO.expected
          diff -u .SRCINFO .SRCINFO.expected

      - name: Validate razer-tray-bin PKGBUILD
        working-directory: arch/aur/razer-tray-bin
        run: |
          bash -n PKGBUILD
          namcap PKGBUILD
          sudo -u builder makepkg --printsrcinfo > .SRCINFO.expected
          diff -u .SRCINFO .SRCINFO.expected

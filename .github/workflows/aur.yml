name: AUR

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine pkgver from tag
        id: ver
        run: echo "pkgver=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Bump pkgver in AUR PKGBUILDs
        run: |
          pkgver="${{ steps.ver.outputs.pkgver }}"
          sed -i "s/^pkgver=.*/pkgver=$pkgver/" arch/aur/razer-tray/PKGBUILD
          sed -i "s/^pkgver=.*/pkgver=$pkgver/" arch/aur/razer-tray-bin/PKGBUILD

      - name: Publish razer-tray (source)
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.3
        with:
          pkgname: razer-tray
          pkgbuild: arch/aur/razer-tray/PKGBUILD
          assets: |
            arch/aur/razer-tray/razer-tray.install
          commit_username: Softer
          commit_email: softer@lin.in.ua
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to ${{ github.ref_name }}"
          updpkgsums: true

      - name: Wait for binary tarball to be downloadable
        run: |
          pkgver="${{ steps.ver.outputs.pkgver }}"
          url="https://github.com/Softer/razer-tray/releases/download/${{ github.ref_name }}/razer-tray-$pkgver-x86_64.tar.gz"
          for i in $(seq 1 30); do
            if curl -sfLI "$url" >/dev/null; then
              echo "tarball available at $url"
              exit 0
            fi
            echo "waiting for $url ..."
            sleep 10
          done
          echo "tarball not available after 5 minutes" >&2
          exit 1

      - name: Publish razer-tray-bin
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.3
        with:
          pkgname: razer-tray-bin
          pkgbuild: arch/aur/razer-tray-bin/PKGBUILD
          assets: |
            arch/aur/razer-tray-bin/razer-tray.install
          commit_username: Softer
          commit_email: softer@lin.in.ua
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to ${{ github.ref_name }}"
          updpkgsums: true
